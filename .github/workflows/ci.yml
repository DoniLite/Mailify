name: ci

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mailify
          POSTGRES_PASSWORD: mailify
          POSTGRES_DB: mailify
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mailify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailpit:
        image: axllent/mailpit:latest
        ports: ["1025:1025", "8025:8025"]
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: "true"
          MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    env:
      MAILIFY_DATABASE__URL: postgres://mailify:mailify@localhost:5432/mailify
      MAILIFY_SMTP__HOST: localhost
      MAILIFY_SMTP__PORT: "1025"
      MAILIFY_SMTP__TLS: none
      MAILPIT_API_URL: http://localhost:8025
      MAILIFY_DOTENV: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features --no-fail-fast

  templates-build:
    name: templates build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
        working-directory: templates-parser
      - run: bun run build
        working-directory: templates-parser
      - name: Upload templates artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-templates
          path: templates-parser/out
# docker image build + push lives in .github/workflows/docker.yml (tag-triggered)
